<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>EliotFWCapital AI Terminal</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  background:#050505;
  color:white;
  font-family:Arial;
}

.glass{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:20px;
}

.gold{color:#d4af37}
.green{color:#00ff95}
.red{color:#ff5b5b}

</style>

</head>

<body class="p-6">

<h1 class="text-3xl gold mb-6">
EliotFWCapital — AI Macro Terminal
</h1>

<!-- IA PANEL -->

<div class="glass mb-6">

  <h2 class="gold text-xl mb-3">
    Interpretación IA Oro (Macro Institucional)
  </h2>

  <p id="analysis" class="text-gray-300 leading-7">
    Cargando análisis...
  </p>

</div>

<!-- DATA -->

<div class="grid grid-cols-2 gap-4">

  <div class="glass">
    <h3 class="gold">DXY</h3>
    <p id="dxy">...</p>
  </div>

  <div class="glass">
    <h3 class="gold">US10Y</h3>
    <p id="bond">...</p>
  </div>

  <div class="glass">
    <h3 class="gold">Inflación</h3>
    <p id="cpi">...</p>
  </div>

  <div class="glass">
    <h3 class="gold">Sentimiento</h3>
    <p id="sentiment">...</p>
  </div>

</div>

<script>

async function load(){

  const res = await fetch("http://localhost:3000/gold-ai");
  const data = await res.json();

  document.getElementById("analysis").innerText = data.analysis;
  document.getElementById("dxy").innerText = data.dxy;
  document.getElementById("bond").innerText = data.bond;
  document.getElementById("cpi").innerText = data.cpi;
  document.getElementById("sentiment").innerText = data.sentiment;

}

load();
setInterval(load, 15000);

</script>

</body>
</html>
